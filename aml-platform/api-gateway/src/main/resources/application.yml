# spring.flyway config
spring:
  datasource:
    url: "jdbc:sqlserver://localhost:1433;databaseName=AMLDB_08062026;trustServerCertificate=true"
    username: "sa"
    password: "admin@123"
    driver-class-name: "com.microsoft.sqlserver.jdbc.SQLServerDriver"
  flyway:
    enabled: true                    # ← no quotes, raw boolean
    locations:
      - classpath:db/migration       # ← 6 spaces, not 8
    baseline-on-migrate: false       # ← no quotes
    validate-on-migrate: true        # ← no quotes

# logging config at ROOT level, not nested under spring
logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure: DEBUG